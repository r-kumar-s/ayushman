  <style>
.float-btn {
    position: fixed;
    right: 25px;
    height: 60px;
    width: 60px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    text-decoration: none !important;
    color: #fff !important;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
    z-index: 9999;
}

.float-btn i {
    width: 60px;
    min-width: 60px;
    text-align: center;
    font-size: 26px;
    line-height: 60px;
}

/* Text */
.float-btn span {
    opacity: 0;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    font-size: 18px;
    font-weight: 800;
    color: #fff !important;
    transition: all 0.3s ease;
}

/* Remove underline */
.float-btn,
.float-btn:hover,
.float-btn:focus,
.float-btn:active,
.float-btn span {
    text-decoration: none !important;
    color: #fff !important;
}

/* Hover expand */
.float-btn:hover {
    width: 220px;
}

.float-btn:hover span {
    opacity: 1;
    max-width: 150px;
    margin-left: 5px;
}

/* Call Button */
.call-float {
    bottom: 140px;
    background: #0d6efd;
}

/* WhatsApp Button */
.whatsapp-float {
    bottom: 65px;
    background: #25d366;
}

@media (max-width: 768px) {

    .call-float {
        right: 50px !important;
        bottom: 180px !important;
    }

    .whatsapp-float {
        right: 50px !important;
        bottom: 100px !important;
    }
}
  </style>
